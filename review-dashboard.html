<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Funnel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; color: #1e293b; min-height: 100vh; }

    /* ── LOGIN ── */
    #login-overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .login-card { background: white; border-radius: 14px; padding: 44px 52px; text-align: center; width: 380px; box-shadow: 0 24px 48px rgba(0,0,0,0.4); }
    .login-logo { font-size: 36px; margin-bottom: 10px; }
    .login-card h1 { font-size: 21px; font-weight: 700; margin-bottom: 6px; color: #1e293b; }
    .login-card p  { font-size: 14px; color: #64748b; margin-bottom: 28px; }
    .login-card input[type="password"] { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 15px; margin-bottom: 12px; outline: none; transition: border-color 0.2s; }
    .login-card input[type="password"]:focus { border-color: #3b82f6; }
    .login-card button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .login-card button:hover { background: #1d4ed8; }
    .login-error { color: #ef4444; font-size: 13px; margin-top: 10px; min-height: 18px; }

    /* ── APP ── */
    #app { display: none; }
    header { background: #1e293b; color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 17px; font-weight: 700; margin: 0; }
    .header-sub { font-size: 12px; color: #94a3b8; margin-top: 1px; }
    .refresh-area { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #94a3b8; }
    .refresh-btn { background: #334155; color: #e2e8f0; border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; transition: background 0.2s; }
    .refresh-btn:hover { background: #475569; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── FUNNEL STAT CARDS ── */
    .funnel { display: flex; gap: 10px; padding: 16px 24px 4px; flex-wrap: wrap; }
    .stat { flex: 1; min-width: 120px; background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: box-shadow .15s, border-color .15s; }
    .stat:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: #93c5fd; }
    .stat.active { border-color: #2563eb; box-shadow: 0 0 0 2px #bfdbfe; }
    .stat .num { font-size: 26px; font-weight: 800; line-height: 1; }
    .stat .lbl { font-size: 11.5px; color: #64748b; margin-top: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
    .stat .sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .s-asked  .num { color: #475569; }
    .s-replied .num { color: #1e40af; }
    .s-happy  .num { color: #166534; }
    .s-sent   .num { color: #7c3aed; }
    .s-human  .num { color: #b91c1c; }
    .s-paused .num { color: #b45309; }
    .abtest { padding: 0 24px 6px; font-size: 12px; color: #64748b; display: none; gap: 12px; flex-wrap: wrap; align-items: center; }   /* hidden 07/17 — ops don't need A/B; set display:flex to restore */
    .abtest .ab { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px 12px; }
    .abtest .ab b { color: #1e293b; }

    /* ── CONTROLS ── */
    .controls { padding: 14px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 14px; pointer-events: none; }
    .search-input { width: 100%; padding: 9px 14px 9px 34px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: #3b82f6; }
    .filter-btn { padding: 9px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-weight: 600; background: white; color: #1e293b; cursor: pointer; white-space: nowrap; }
    .filter-btn.active { background: #2563eb; border-color: #2563eb; color: white; }
    .filter-btn.done { background: #dcfce7; border-color: #86efac; color: #166534; }
    .filter-btn.done.active { background: #16a34a; border-color: #16a34a; color: #fff; }
    /* Dev-only toggles — keep reachable but visually quiet (ops rarely need these) */
    .filter-btn-dev { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; border-width: 1px; color: #94a3b8; border-color: #e2e8f0; background: transparent; opacity: .7; }
    .filter-btn-dev:hover { opacity: 1; color: #64748b; }
    .filter-btn-dev.active { background: #f1f5f9; border-color: #cbd5e1; color: #64748b; opacity: .85; }
    .big-choice { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 40px 8vw; }
    .choice-card { border: 2px solid #e2e8f0; border-radius: 14px; background: #fff; padding: 28px 24px; cursor: pointer; text-align: left; transition: border-color .15s, transform .1s; }
    .choice-card:hover { border-color: #2563eb; transform: translateY(-2px); }
    .choice-card.done { background: #f0fdf4; border-color: #86efac; }
    .choice-title { font-size: 22px; font-weight: 700; color: #0f172a; }
    .choice-sub { font-size: 13px; color: #64748b; margin: 4px 0 16px; }
    .prog { height: 8px; border-radius: 6px; background: #e2e8f0; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 6px; background: #2563eb; transition: width .3s; }
    .choice-card.done .prog-fill { background: #16a34a; }
    .choice-meta { font-size: 13px; color: #475569; margin-top: 8px; font-weight: 600; }
    .btn-done { background: #0369a1; border-color: #0369a1; color: #fff; }
    .btn-done:hover:not(:disabled) { background: #075985; }
    .btn-done:disabled { opacity: .45; cursor: not-allowed; }
    .sel-label { font-size: 13px; color: #475569; white-space: nowrap; }
    .record-count { font-size: 13px; color: #64748b; white-space: nowrap; margin-left: auto; }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; padding: 4px 24px 32px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    thead { background: #f8fafc; }
    th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
    td { padding: 11px 14px; font-size: 13.5px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    tr.sel td { background: #eff6ff; }
    tr.sel:hover td { background: #dbeafe; }
    input[type="checkbox"].row-check, input[type="checkbox"]#selectAll { width: 15px; height: 15px; cursor: pointer; }
    .col-check { width: 34px; text-align: center; }
    .job-num { font-weight: 700; font-size: 13px; color: #1e293b; }
    a.tlink { color: #2563eb; text-decoration: none; }
    a.tlink:hover { text-decoration: underline; }
    a.tlink .job-num { color: #2563eb; }
    .customer-name { font-weight: 600; }
    .reply-text { max-width: 340px; color: #334155; font-size: 13px; line-height: 1.35; }
    .reply-meta { font-size: 11px; color: #94a3b8; margin-top: 3px; }

    /* ── BADGES ── */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
    .badge-gray   { background: #f1f5f9; color: #475569; }
    .badge-blue   { background: #dbeafe; color: #1e40af; }
    .badge-green  { background: #dcfce7; color: #166534; }
    .badge-purple { background: #ede9fe; color: #6d28d9; }
    .badge-slate  { background: #e2e8f0; color: #334155; }
    .badge-red    { background: #fee2e2; color: #991b1b; }
    .badge-orange { background: #fef3c7; color: #b45309; }
    .badge-yellow { background: #fef9c3; color: #854d0e; }
    .flag { color: #b91c1c; font-weight: 700; }
    .len-long { color: #b45309; font-weight: 700; }
    .len-ok   { color: #059669; font-weight: 600; }

    /* ── KANBAN (Multi-Visit / HCP pipeline) ── */
    .kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: start; }
    @media (max-width: 860px) { .kanban { grid-template-columns: 1fr; } }
    .kcol { background: #eef2f7; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; min-height: 120px; }
    .kcol-head { display: flex; align-items: center; justify-content: space-between; padding: 4px 6px 10px; }
    .kcol-title { font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #475569; }
    .kcol-count { font-size: 12px; font-weight: 700; background: #fff; border: 1px solid #e2e8f0; border-radius: 999px; padding: 2px 9px; color: #475569; }
    .kcol.k-done { background: #f0fdf4; border-color: #bbf7d0; }
    .kcard { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
    .kcard:last-child { margin-bottom: 0; }
    .kcard .kname { font-weight: 700; font-size: 14px; }
    .kcard .kmeta { font-size: 12px; color: #64748b; margin-top: 3px; line-height: 1.5; }
    .kbtn { width: 100%; margin-top: 10px; padding: 8px 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .kbtn-row { display: flex; gap: 8px; margin-top: 10px; }
    .kbtn-row .kbtn { margin-top: 0; flex: 1; }
    .kbtn-send { background: #2563eb; color: #fff; }
    .kbtn-send:hover { background: #1d4ed8; }
    .kbtn-back { background: #fff; color: #475569; border: 1.5px solid #cbd5e1; }
    .kbtn-back:hover { background: #f8fafc; border-color: #94a3b8; }
    .kbtn-done { background: #16a34a; color: #fff; }
    .kbtn-done:hover { background: #15803d; }
    .kbtn:disabled { opacity: .5; cursor: wait; }
    .age { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 700; }
    .age-fresh { background: #f1f5f9; color: #475569; }
    .age-warn  { background: #fef3c7; color: #b45309; }
    .age-late  { background: #fee2e2; color: #991b1b; }
    .kempty { text-align: center; color: #94a3b8; font-size: 13px; padding: 24px 8px; }

    .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,.3); opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 2000; }
    .toast.show { opacity: 1; }
    .loading-state, .empty-state { text-align: center; padding: 60px 24px; color: #94a3b8; font-size: 14px; }
    .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state { text-align: center; padding: 60px 24px; color: #ef4444; font-size: 14px; }
    footer { text-align: center; padding: 14px; font-size: 12px; color: #cbd5e1; }
  </style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">⭐</div>
    <h1>Review Funnel</h1>
    <p>Enter your access code to continue</p>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
    <button onclick="checkPassword()">Sign In</button>
    <div class="login-error" id="pw-error"></div>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">
  <header>
    <div class="header-left">
      <span style="font-size:20px;">⭐</span>
      <div>
        <h1>Review Funnel</h1>
        <div class="header-sub">Post-Service Survey Tracker</div>
      </div>
    </div>
    <div class="refresh-area">
      <span class="dot"></span>
      <span id="last-updated">Loading…</span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </header>

  <div class="funnel" id="funnel"></div>
  <div class="abtest" id="abtest"></div>

  <div class="controls">
    <button type="button" class="filter-btn" id="visit-single" onclick="setVisit('single')" title="Never-paused jobs. All communication happens in the Dispatch conversation.">1 Visit <span style="font-weight:400;">(Dispatch.me)</span></button>
    <button type="button" class="filter-btn" id="visit-multi" onclick="setVisit('multi')" title="Paused / NCC jobs. Call the customer through Housecall Pro (305 line). Never auto-texted.">Multi-Visit <span style="font-weight:400;">(Housecall Pro)</span></button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-box" type="text" placeholder="Search name, job #, reply…" oninput="applyFilters()" />
    </div>
    <button type="button" class="filter-btn filter-btn-dev active" id="active-filter" onclick="toggleActiveOnly()" title="Dev: hide resolved/closed and jobs 5+ days past completion (needs-human always stays)">Active only</button>
    <button type="button" class="filter-btn filter-btn-dev active" id="human-filter" onclick="toggleHumanFilter()" title="Dev: only rows that need a human">Needs human</button>
    <span class="sel-label" id="sel-label">0 selected</span>
    <button type="button" class="filter-btn btn-done" id="done-btn" onclick="markDone()" disabled>✓ Mark Done (<span id="sel-count">0</span>)</button>
    <span class="record-count" id="record-count"></span>
  </div>

  <div class="table-wrap">
    <div id="table-container">
      <div class="loading-state"><div class="spinner"></div><br>Loading review data…</div>
    </div>
  </div>

  <footer>Review Funnel · reads the Review Tracker sheet (free reads) · datastore 116481 = source of truth · internal use only</footer>
</div>
<div class="toast" id="toast"></div>

<script>
  // ─────────────────────────────────────
  //  CONFIG
  // ─────────────────────────────────────
  const PASSWORD = 'worker2026';                         // same gate as intake dashboard
  // Apps Script web app on the Review Tracker spreadsheet (see WIP/review-tracker-gas.gs).
  // Instant reads (no publish lag) + realtime writes, zero Make ops. Until pasted, the
  // dashboard falls back to the published CSV for reads and the Make webhook for writes.
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbx7zsfOk1Dyk8NpYpZLXkeBMz57so-6n_TzMRo47-kthCqiLVKzFedmVuWVWAhLtsBH/exec';
  const GAS_SECRET = 'AAxnzkLRrmt1xyqf0LGSyVij';
  const gasReady = () => !GAS_URL.startsWith('PASTE_');
  // FALLBACKS (pre-GAS): published CSV of the "Review Tracker" tab + Make resolve webhook.
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_ET0tI7CyDMdDOtXP9MOyFZnIbkgrnIaZ2V0el70eMGo9tX8hA3vq58tMT-JOhZad_OCQeqG_X5X7/pub?gid=0&single=true&output=csv';
  const RESOLVE_WEBHOOK = 'https://hook.us2.make.com/gmqonk8heubt9vq22xbstpsqve8o6mpu';
  const REFRESH_MS = 60000;
  const ACTIVE_DAYS = 5;                                 // rows older than this (since completion) drop out of "Active only"

  // Append-only log column order (row per event). MUST match the sheet header exactly.
  // A timestamp · B event · C stage · D customerId · E jobId · F jobLink · G workOrder
  // H customerName · I city · J serviceType · K sentiment · L replyText · M replyWords · N completedAt
  const COL = { TS:0, EVENT:1, STAGE:2, CUSTOMER_ID:3, JOB_ID:4, JOB_LINK:5, WO:6,
                NAME:7, CITY:8, SERVICE:9, SENTIMENT:10, REPLY:11, REPLY_WORDS:12, COMPLETED:13, VARIANT:14 };

  // Funnel cards — set show:true to bring a card back. Ops view only needs human + hold.
  const STAGES = [
    { key: 'asked',   cls: 's-asked',   label: 'Asked',       sub: 'awaiting reply',      show: false },
    { key: 'replied', cls: 's-replied', label: 'Replied',     sub: 'customer responded',  show: false },
    { key: 'happy',   cls: 's-happy',   label: 'Happy',       sub: 'positive signal',     show: false },
    { key: 'sent',    cls: 's-sent',    label: 'Review link', sub: 'portal link sent',    show: false },
    { key: 'human',   cls: 's-human',   label: 'Needs human', sub: 'reply in Dispatch',   show: true  },
    { key: 'paused',  cls: 's-paused',  label: 'Hold (HCP)',  sub: 'paused / recall — call first', show: true },
  ];

  // ─────────────────────────────────────
  //  STATE
  // ─────────────────────────────────────
  let allData = [], filteredData = [], refreshTimer = null;
  let activeStage = null, humanOnly = true, activeOnly = true, visitFilter = null;

  // ─────────────────────────────────────
  //  AUTH
  // ─────────────────────────────────────
  function checkPassword() {
    const val = document.getElementById('pw-input').value;
    if (val === PASSWORD) {
      sessionStorage.setItem('review_auth', '1');
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadData(); startAutoRefresh();
    } else {
      const err = document.getElementById('pw-error');
      err.textContent = 'Incorrect password — try again.';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
      setTimeout(() => { err.textContent = ''; }, 3000);
    }
  }
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
  if (sessionStorage.getItem('review_auth') === '1') {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData(); startAutoRefresh();
  }

  // ─────────────────────────────────────
  //  CSV PARSER (quoted multi-line safe) — same engine as the intake dashboard
  // ─────────────────────────────────────
  function parseCSV(text) {
    const rows = []; let row = [], cur = '', q = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], nx = text[i + 1];
      if (ch === '"') { if (q && nx === '"') { cur += '"'; i++; } else q = !q; }
      else if (ch === ',' && !q) { row.push(cur); cur = ''; }
      else if ((ch === '\r' || ch === '\n') && !q) { if (ch === '\r' && nx === '\n') i++; row.push(cur); cur = ''; if (row.some(c => c !== '')) rows.push(row); row = []; }
      else cur += ch;
    }
    if (cur !== '' || row.length) { row.push(cur); if (row.some(c => c !== '')) rows.push(row); }
    return rows;
  }

  // ─────────────────────────────────────
  //  DATA LOAD  →  collapse the event log to one record per customer
  // ─────────────────────────────────────
  async function loadData() {
    document.getElementById('last-updated').textContent = 'Refreshing…';
    try {
      let rows;
      if (gasReady()) {   // Apps Script JSON: instant, no publish lag
        const resp = await fetch(`${GAS_URL}?secret=${encodeURIComponent(GAS_SECRET)}&_=${Date.now()}`, { cache: 'no-store' });
        if (!resp.ok) throw new Error(`GAS HTTP ${resp.status}`);
        const j = await resp.json();
        if (j.error) throw new Error('GAS: ' + j.error);
        rows = (j.rows || []).slice(1).map(r => r.map(c => c == null ? '' : String(c)));
      } else {            // fallback: published CSV (1-5 min lag)
        const resp = await fetch(SHEET_CSV_URL + '&_=' + Date.now(), { cache: 'no-store' });  // cache-buster: force a fresh pull each refresh
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        rows = parseCSV(await resp.text()).slice(1);   // drop header
      }
      allData = collapse(rows);
      const t = new Date();
      document.getElementById('last-updated').textContent = 'Updated ' + t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      renderFunnel(); renderAB(); applyFilters();
    } catch (err) {
      document.getElementById('last-updated').textContent = 'Error — check feed';
      document.getElementById('table-container').innerHTML = `<div class="error-state">⚠️ Could not load data.<br><small>${err.message}</small></div>`;
    }
  }
  function startAutoRefresh() { if (refreshTimer) clearInterval(refreshTimer); refreshTimer = setInterval(loadData, REFRESH_MS); }

  // Group the append-only rows by customerId; latest non-empty value wins for each field.
  function collapse(rows) {
    const g = (rows || []).map(r => r.map(c => (c || '').trim()))
      .filter(r => r[COL.CUSTOMER_ID])
      .sort((a, b) => new Date(a[COL.TS] || 0) - new Date(b[COL.TS] || 0));
    const byCust = {};
    for (const r of g) {
      const id = r[COL.CUSTOMER_ID];
      const rec = byCust[id] || (byCust[id] = { customerId: id });
      const ev = (r[COL.EVENT] || '').toLowerCase();
      const set = (k, v) => { if (v) rec[k] = v; };
      set('stage', r[COL.STAGE]); set('jobId', r[COL.JOB_ID]); set('jobLink', r[COL.JOB_LINK]);
      set('jobTitle', r[COL.WO]); set('customerName', r[COL.NAME]); set('city', r[COL.CITY]);
      set('serviceType', r[COL.SERVICE]); set('sentiment', r[COL.SENTIMENT]);
      set('completedAt', r[COL.COMPLETED]); set('variant', r[COL.VARIANT]);
      if (r[COL.REPLY]) { rec.replyText = stripRelayWrapper(r[COL.REPLY]); rec.replyAt = r[COL.TS]; }
      if (ev === 'nudge_sent') rec.askedAt = r[COL.TS];   // latest nudge wins, matching the latest-job collapse
      if (ev === 'review_link_sent') rec.reviewSentAt = r[COL.TS];
      if (ev === 'human_resolved') rec.resolvedAt = r[COL.TS];
      if (ev === 'nudge_skipped_paused') rec.pausedSkipAt = r[COL.TS];
      if (ev === 'nudge_skipped_recall') rec.recallSkipAt = r[COL.TS];
      if (ev === 'hcp_msg1_sent') rec.msg1SentAt = r[COL.TS];
      if (ev === 'hcp_msg1_undo') delete rec.msg1SentAt;   // Back from Waiting → No Message Sent
    }
    const o = overlay(OVERLAY_RESOLVED), m = overlay(OVERLAY_MSG1);
    for (const rec of Object.values(byCust)) {
      if (!rec.resolvedAt && o[rec.customerId]) rec.resolvedAt = o[rec.customerId];
      if (!rec.msg1SentAt && m[rec.customerId]) rec.msg1SentAt = m[rec.customerId];
    }
    return Object.values(byCust);
  }

  // Older sheet rows stored the full Dispatch relay email; new rows arrive pre-cleaned by Msg-2.
  function stripRelayWrapper(t) {
    if (!t) return t;
    return t.replace(/^[\s\S]*?sent you a message:\s*["“]?/, '').replace(/["”]?\s*To respond[\s\S]*$/, '').trim();
  }

  // ─────────────────────────────────────
  //  BUCKET / ACTIVE / FILTERS
  // ─────────────────────────────────────
  function bucketOf(r) {
    const s = (r.stage || '').toLowerCase();
    if (r.resolvedAt || s === 'resolved') return 'resolved';   // human marked done
    if (s.startsWith('escalated') || s === 'needs_human') return 'human';   // covers escalated + escalated_urgent (v2)
    if (s === 'paused_skip' || s === 'skip_recall') return 'paused';   // hold lane: human calls first, system never texts them
    if (r.reviewSentAt || s === 'closed') return 'sent';
    if ((r.sentiment || '').toLowerCase() === 'happy') return 'happy';
    if (r.replyText) return 'replied';
    return 'asked';
  }
  // Optimistic overlays (bridge the gap until the sheet read reflects a click; expire after 2h)
  const OVERLAY_RESOLVED = 'rf_resolved_overlay', OVERLAY_MSG1 = 'rf_msg1_overlay';
  function overlay(key) {
    try {
      const o = JSON.parse(localStorage.getItem(key) || '{}');
      const cut = Date.now() - 2 * 3600 * 1000;   // sheet has definitely caught up after 2h
      for (const k in o) if (new Date(o[k]).getTime() < cut) delete o[k];
      return o;
    } catch { return {}; }
  }
  function rememberOverlay(key, cids) {
    const o = overlay(key); const ts = new Date().toISOString();
    for (const c of cids) o[c] = ts;
    try { localStorage.setItem(key, JSON.stringify(o)); } catch {}
  }
  function forgetOverlay(key, cids) {
    const o = overlay(key);
    for (const c of cids) delete o[c];
    try { localStorage.setItem(key, JSON.stringify(o)); } catch {}
  }
  const MULTI_STAGES = new Set(['paused_skip', 'skip_recall']);
  function tabOf(r) { return MULTI_STAGES.has((r.stage || '').toLowerCase()) ? 'multi' : 'single'; }
  function tabStats(tab) {
    let todo = 0, done = 0;
    for (const r of allData) {
      if (tabOf(r) !== tab) continue;
      const b = bucketOf(r);
      if (tab === 'multi' ? (b === 'paused' && isActive(r)) : b === 'human') todo++;
      else if (b === 'resolved' && r.resolvedAt) {
        const d = (Date.now() - new Date(r.resolvedAt).getTime()) / 86400000;
        if (!isNaN(d) && d <= ACTIVE_DAYS) done++;
      }
    }
    return { todo, done, total: todo + done, pct: (todo + done) ? Math.round(done / (todo + done) * 100) : 100 };
  }
  // Terminal (done) buckets never show under "Active only".
  const TERMINAL = new Set(['sent', 'resolved']);
  function isActive(r) {
    const b = bucketOf(r);
    if (b === 'human') return true;             // unresolved needs-human always stays active
    if (b === 'paused') return true;            // hold lane stays visible until confirmed done
    if (TERMINAL.has(b)) return false;          // happy/closed + resolved → inactive
    const ref = r.completedAt || r.askedAt || r.replyAt;   // asked/replied → active only if recent
    if (!ref) return true;
    const days = (Date.now() - new Date(ref).getTime()) / 86400000;
    return isNaN(days) ? true : days <= ACTIVE_DAYS;
  }

  function toggleActiveOnly() {
    activeOnly = !activeOnly;
    document.getElementById('active-filter').classList.toggle('active', activeOnly);
    applyFilters();
  }
  function toggleHumanFilter() {
    humanOnly = !humanOnly;
    document.getElementById('human-filter').classList.toggle('active', humanOnly);
    if (humanOnly) activeStage = null;
    renderFunnel(); applyFilters();
  }
  function setStage(key) {
    activeStage = (activeStage === key) ? null : key;
    if (activeStage) humanOnly = false;
    document.getElementById('human-filter').classList.remove('active');
    renderFunnel(); applyFilters();
  }
  function updateVisitButtons() {
    const cfg = [['visit-single', 'single', '1 Visit <span style="font-weight:400;">(Dispatch.me)</span>'],
                 ['visit-multi', 'multi', 'Multi-Visit <span style="font-weight:400;">(Housecall Pro)</span>']];
    for (const [id, tab, label] of cfg) {
      const el = document.getElementById(id); if (!el) continue;
      const st = tabStats(tab);
      el.classList.toggle('active', visitFilter === tab);
      el.classList.toggle('done', st.todo === 0);
      el.innerHTML = label + (st.todo === 0 ? ' ✓' : ` · ${st.todo}`);
    }
    // Bulk select + Mark Done only apply to the 1-Visit table (kanban has per-card Back/Done)
    const showBulk = visitFilter === 'single';
    document.getElementById('sel-label').style.display = showBulk ? '' : 'none';
    document.getElementById('done-btn').style.display = showBulk ? '' : 'none';
  }
  function renderChooser() {
    const cards = [['single', '1 Visit', 'Dispatch.me · reply inside the Dispatch conversation'],
                   ['multi', 'Multi-Visit', 'Housecall Pro pipeline · send 1st message, track replies (305 line)']].map(([tab, title, sub]) => {
      const st = tabStats(tab);
      return `<button class="choice-card ${st.todo === 0 ? 'done' : ''}" onclick="setVisit('${tab}')">
        <div class="choice-title">${title}</div><div class="choice-sub">${sub}</div>
        <div class="prog"><div class="prog-fill" style="width:${st.pct}%"></div></div>
        <div class="choice-meta">${st.todo === 0 ? 'All caught up ✓' : `${st.todo} to handle · ${st.done} done`}</div>
      </button>`;
    }).join('');
    document.getElementById('table-container').innerHTML = `<div class="big-choice">${cards}</div>`;
    document.getElementById('record-count').textContent = '';
    updateSel();
  }
  function applyFilters() {
    updateVisitButtons();
    if (!visitFilter) { filteredData = []; renderChooser(); return; }
    const q = document.getElementById('search-box').value.toLowerCase();
    const hayOf = r => [r.customerName, r.jobTitle, r.jobId, r.replyText, r.city].join(' ').toLowerCase();
    if (visitFilter === 'multi') {   // kanban view: search only — the columns ARE the state filter
      filteredData = allData.filter(r => tabOf(r) === 'multi' && (!q || hayOf(r).includes(q)));
      renderKanban(); return;
    }
    // Drilling into a specific stage card shows that whole bucket, ignoring the Active-only cap.
    const capActive = activeOnly && !activeStage;
    filteredData = allData.filter(r => {
      const b = bucketOf(r);
      return tabOf(r) === 'single'
        && (!q || hayOf(r).includes(q))
        && (!activeStage || b === activeStage)
        && (!humanOnly || b === 'human')
        && (!capActive || isActive(r));
    });
    renderTable();
  }
  function setVisit(v) {
    visitFilter = (visitFilter === v) ? null : v;
    document.getElementById('visit-single').classList.toggle('active', visitFilter === 'single');
    document.getElementById('visit-multi').classList.toggle('active', visitFilter === 'multi');
    applyFilters();
  }

  // ─────────────────────────────────────
  //  RENDER
  // ─────────────────────────────────────
  function counts() {   // lifetime funnel totals (all data)
    const c = { asked:0, replied:0, happy:0, sent:0, human:0, paused:0 };
    allData.forEach(r => { const b = bucketOf(r); if (b in c) c[b]++; });
    return c;
  }
  function renderAB() {   // nudge A/B readout (UI hidden via CSS — flip .abtest to display:flex to restore)
    const el = document.getElementById('abtest'); if (!el) return;
    const g = {};
    allData.forEach(r => {
      const raw = (r.variant || '');
      const v = /^\d$/.test(raw) ? ('02468'.includes(raw) ? 'A' : 'B') : raw.toUpperCase();  // digit → even=A, odd=B
      if (v !== 'A' && v !== 'B') return;
      (g[v] = g[v] || { asked: 0, replied: 0 }); g[v].asked++; if (r.replyText) g[v].replied++;
    });
    const parts = ['A', 'B'].filter(v => g[v]).map(v => { const { asked, replied } = g[v]; const rate = asked ? Math.round(replied / asked * 100) : 0; return `<span class="ab"><b>Nudge ${v}</b> ${v === 'A' ? '(single)' : '(two-msg)'} · ${asked} asked · ${replied} replied · <b>${rate}%</b></span>`; });
    el.innerHTML = parts.length ? `<span style="font-weight:600;">A/B nudge test:</span>` + parts.join('') : '';
  }
  function renderFunnel() {
    const c = counts();
    document.getElementById('funnel').innerHTML = STAGES.filter(s => s.show).map(s => `
      <div class="stat ${s.cls} ${activeStage===s.key?'active':''}" onclick="setStage('${s.key}')">
        <div class="num">${c[s.key]||0}</div><div class="lbl">${s.label}</div><div class="sub">${s.sub}</div>
      </div>`).join('');
  }
  function wordCount(t){ return t ? t.trim().split(/\s+/).filter(Boolean).length : 0; }
  function esc(t){ return (t==null?'':String(t)).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
  function fmt(d){ if(!d) return '—'; const x=new Date(d); return isNaN(x)?esc(d):x.toLocaleDateString([], {month:'short',day:'numeric'})+' '+x.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
  const STAGE_BADGE = { asked:['badge-gray','Asked'], replied:['badge-blue','Replied'], happy:['badge-green','Happy'], sent:['badge-purple','Review link sent'], resolved:['badge-slate','Done'], human:['badge-red','Needs human'], paused:['badge-orange','Paused / NCC'] };
  const SENTIMENT_BADGE = { happy:['badge-green','Happy'], unhappy:['badge-red','Unhappy'], unclear:['badge-yellow','Unclear'] };

  function renderTable() {
    document.getElementById('record-count').textContent = `${filteredData.length} of ${allData.length}`;
    if (!filteredData.length) { document.getElementById('table-container').innerHTML = `<div class="empty-state">No matching records.</div>`; updateSel(); return; }
    const order = { human:0, paused:1, happy:2, replied:3, sent:4, resolved:5, asked:6 };
    const rows = [...filteredData].sort((a,b) => (order[bucketOf(a)]-order[bucketOf(b)]) || (new Date(b.replyAt||b.askedAt||0)-new Date(a.replyAt||a.askedAt||0)));
    let html = `<table><thead><tr>
      <th class="col-check"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)" title="Select all shown" /></th>
      <th>Customer</th><th>Job / WO</th><th>Stage</th><th>Sentiment</th></tr></thead><tbody>`;
    for (const r of rows) {
      const b = bucketOf(r); const [scls, slbl] = STAGE_BADGE[b] || ['badge-gray', b];
      const wc = wordCount(r.replyText); const lenCls = wc >= 25 ? 'len-long' : (wc ? 'len-ok' : '');
      const sb = SENTIMENT_BADGE[(r.sentiment||'').toLowerCase()];
      const jobLink = r.jobLink || (/^\d+$/.test(String(r.jobId||'')) ? 'https://work.dispatch.me/job/' + r.jobId : '');
      const jobCell = jobLink ? `<a class="tlink" href="${jobLink}" target="_blank" rel="noopener"><span class="job-num">${esc(r.jobId)}</span> ↗</a>` : `<span class="job-num">${esc(r.jobId||'—')}</span>`;
      const cityLine = r.city ? `<div class="reply-meta">${esc(r.city)}</div>` : '';
      html += `<tr>
        <td class="col-check"><input type="checkbox" class="row-check" data-cid="${esc(r.customerId)}" onchange="updateSel()" /></td>
        <td><div class="customer-name">${esc(r.customerName||'—')}</div>${cityLine}</td>
        <td>${jobCell}<div class="reply-meta">${esc(r.jobTitle||'')}</div></td>
        <td><span class="badge ${scls}">${slbl}</span>${b==='human'?' <span class="flag">●</span>':''}</td>
        <td>${ sb ? `<span class="badge ${sb[0]}">${sb[1]}</span>` : '—' }</td>
      </tr>`;
    }
    document.getElementById('table-container').innerHTML = html + `</tbody></table>`;
    updateSel();
  }

  // ─────────────────────────────────────
  //  KANBAN (Multi-Visit / HCP pipeline)
  //  col 1: nothing sent yet → col 2: 1st message sent (elapsed timer) → col 3: done
  // ─────────────────────────────────────
  function ageBadge(ts) {
    const h = (Date.now() - new Date(ts).getTime()) / 3600000;
    if (isNaN(h)) return '';
    const txt = h < 1 ? `${Math.max(1, Math.round(h * 60))}m` : h < 48 ? `${Math.round(h)}h` : `${Math.floor(h / 24)}d`;
    const cls = h < 24 ? 'age-fresh' : h < 48 ? 'age-warn' : 'age-late';
    return `<span class="age ${cls}" title="Time since 1st message">⏱ ${txt} ago</span>`;
  }
  function reasonBadge(r) {
    const recall = (r.stage || '').toLowerCase() === 'skip_recall' || r.recallSkipAt;
    return recall ? '<span class="badge badge-red">Recall</span>' : '<span class="badge badge-orange">Paused / NCC</span>';
  }
  function kcard(r, col) {
    const jobLink = r.jobLink || (/^\d+$/.test(String(r.jobId||'')) ? 'https://work.dispatch.me/job/' + r.jobId : '');
    const job = jobLink ? `<a class="tlink" href="${jobLink}" target="_blank" rel="noopener">${esc(r.jobId)} ↗</a>` : esc(r.jobId || '—');
    const btn = col === 0
      ? `<button class="kbtn kbtn-send" onclick="confirmMsg1('${esc(r.customerId)}', this)">✉ Confirm 1st message sent</button>`
      : col === 1
      ? `<div class="kbtn-row">
          <button class="kbtn kbtn-back" onclick="kanbanBack('${esc(r.customerId)}', this)">← Back</button>
          <button class="kbtn kbtn-done" onclick="kanbanDone('${esc(r.customerId)}', this)">✓ Done</button>
        </div>`
      : '';
    return `<div class="kcard">
      <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;">
        <span class="kname">${esc(r.customerName || '—')}</span>${reasonBadge(r)}
      </div>
      <div class="kmeta">${job}${r.city ? ' · ' + esc(r.city) : ''}<br>Completed ${fmt(r.completedAt)}${col === 1 ? '<br>' + ageBadge(r.msg1SentAt) : ''}${col === 2 ? '<br>Done ' + fmt(r.resolvedAt) : ''}</div>
      ${btn}</div>`;
  }
  function renderKanban() {
    document.getElementById('record-count').textContent = `${filteredData.length} of ${allData.length}`;
    const cols = [[], [], []];
    for (const r of filteredData) {
      if (r.resolvedAt) { const d = (Date.now() - new Date(r.resolvedAt).getTime()) / 86400000; if (isNaN(d) || d <= ACTIVE_DAYS) cols[2].push(r); }
      else if (r.msg1SentAt) cols[1].push(r);
      else cols[0].push(r);
    }
    cols[0].sort((a,b) => new Date(a.completedAt||0) - new Date(b.completedAt||0));
    cols[1].sort((a,b) => new Date(a.msg1SentAt||0) - new Date(b.msg1SentAt||0));   // oldest waiting first
    cols[2].sort((a,b) => new Date(b.resolvedAt||0) - new Date(a.resolvedAt||0));
    const meta = [['No Message Sent', ''], ['Waiting for Reply', ''], ['Done', 'k-done']];
    document.getElementById('table-container').innerHTML = `<div class="kanban">` + meta.map(([title, cls], i) => `
      <div class="kcol ${cls}">
        <div class="kcol-head"><span class="kcol-title">${title}</span><span class="kcol-count">${cols[i].length}</span></div>
        ${cols[i].length ? cols[i].map(r => kcard(r, i)).join('') : `<div class="kempty">${i === 2 ? 'Nothing finished yet' : 'Empty — all clear'}</div>`}
      </div>`).join('') + `</div>`;
    updateSel();
  }

  // Single event write: Apps Script when wired, Make webhook fallback (human_resolved only).
  async function postEvent(event, cid) {
    if (gasReady()) {
      const res = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' },   // text/plain avoids CORS preflight
        body: JSON.stringify({ secret: GAS_SECRET, event, customerId: cid }) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const j = await res.json();
      if (j.error) throw new Error(j.error);
    } else {
      if (event !== 'human_resolved') throw new Error('Apps Script not wired yet (needed for this action)');
      const res = await fetch(RESOLVE_WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ customerId: cid }) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
    }
  }
  function disableKanbanBtns(btn) {
    const row = btn.closest('.kbtn-row');
    (row ? [...row.querySelectorAll('button')] : [btn]).forEach(b => { b.disabled = true; });
  }
  function enableKanbanBtns(btn) {
    const row = btn.closest('.kbtn-row');
    (row ? [...row.querySelectorAll('button')] : [btn]).forEach(b => { b.disabled = false; });
  }
  async function confirmMsg1(cid, btn) {
    btn.disabled = true;
    try {
      await postEvent('hcp_msg1_sent', cid);
      rememberOverlay(OVERLAY_MSG1, [cid]);
      const r = allData.find(x => String(x.customerId) === String(cid)); if (r) r.msg1SentAt = new Date().toISOString();
      renderFunnel(); applyFilters(); toast('✓ Moved to Waiting for Reply');
      setTimeout(loadData, gasReady() ? 4000 : 15000);
    } catch (err) { toast('⚠️ Could not save — ' + err.message); btn.disabled = false; }
  }
  async function kanbanBack(cid, btn) {
    disableKanbanBtns(btn);
    try {
      await postEvent('hcp_msg1_undo', cid);
      forgetOverlay(OVERLAY_MSG1, [cid]);
      const r = allData.find(x => String(x.customerId) === String(cid)); if (r) delete r.msg1SentAt;
      renderFunnel(); applyFilters(); toast('↩ Moved back to No Message Sent');
      setTimeout(loadData, gasReady() ? 4000 : 15000);
    } catch (err) { toast('⚠️ Could not save — ' + err.message); enableKanbanBtns(btn); }
  }
  async function kanbanDone(cid, btn) {
    disableKanbanBtns(btn);
    try {
      await postEvent('human_resolved', cid);
      rememberOverlay(OVERLAY_RESOLVED, [cid]);
      const r = allData.find(x => String(x.customerId) === String(cid)); if (r) r.resolvedAt = new Date().toISOString();
      renderFunnel(); applyFilters(); toast('✓ Done');
      setTimeout(loadData, gasReady() ? 4000 : 15000);
    } catch (err) { toast('⚠️ Could not save — ' + err.message); enableKanbanBtns(btn); }
  }

  // ─────────────────────────────────────
  //  SELECTION + MARK DONE
  // ─────────────────────────────────────
  function selectedCids() { return [...document.querySelectorAll('.row-check:checked')].map(c => c.dataset.cid); }
  function updateSel() {
    const boxes = [...document.querySelectorAll('.row-check')];
    const checked = boxes.filter(c => c.checked);
    boxes.forEach(c => c.closest('tr').classList.toggle('sel', c.checked));
    const n = checked.length;
    document.getElementById('sel-label').textContent = `${n} selected`;
    document.getElementById('sel-count').textContent = n;
    document.getElementById('done-btn').disabled = n === 0;
    const all = document.getElementById('selectAll');
    if (all) { all.checked = boxes.length > 0 && n === boxes.length; all.indeterminate = n > 0 && n < boxes.length; }
  }
  function toggleSelectAll(cb) { document.querySelectorAll('.row-check').forEach(c => { c.checked = cb.checked; }); updateSel(); }

  function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

  async function markDone() {
    const cids = selectedCids();
    if (!cids.length) return;
    if (!confirm(`Mark ${cids.length} customer${cids.length !== 1 ? 's' : ''} as done? They'll drop off the active list.`)) return;
    const btn = document.getElementById('done-btn'); btn.disabled = true;
    try {
      for (const cid of cids) await postEvent('human_resolved', cid);   // one append per customer
      rememberOverlay(OVERLAY_RESOLVED, cids);   // survives refreshes until the sheet read reflects it
      const ts = new Date().toISOString();
      for (const r of allData) if (cids.includes(String(r.customerId)) && !r.resolvedAt) r.resolvedAt = ts;
      renderFunnel(); renderAB(); applyFilters();
      btn.disabled = false;
      toast(`✓ Marked ${cids.length} done`);
      setTimeout(loadData, gasReady() ? 4000 : 15000);   // background reconcile
    } catch (err) {
      toast('⚠️ Could not mark done — ' + err.message);
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
