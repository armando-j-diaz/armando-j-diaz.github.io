<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HVAC Worker Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4f8; color: #1e293b; min-height: 100vh; }

    /* ── LOGIN ── */
    #login-overlay {
      position: fixed; inset: 0; background: #0f172a;
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .login-card {
      background: white; border-radius: 14px; padding: 44px 52px;
      text-align: center; width: 380px; box-shadow: 0 24px 48px rgba(0,0,0,0.4);
    }
    .login-logo { font-size: 36px; margin-bottom: 10px; }
    .login-card h1 { font-size: 21px; font-weight: 700; margin-bottom: 6px; color: #1e293b; }
    .login-card p { font-size: 14px; color: #64748b; margin-bottom: 28px; }
    .login-card input[type="password"] {
      width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 15px; margin-bottom: 12px; outline: none;
      transition: border-color 0.2s;
    }
    .login-card input[type="password"]:focus { border-color: #3b82f6; }
    .login-card button {
      width: 100%; padding: 12px; background: #2563eb; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .login-card button:hover { background: #1d4ed8; }
    .login-error { color: #ef4444; font-size: 13px; margin-top: 10px; min-height: 18px; }

    /* ── MAIN APP ── */
    #app { display: none; }

    header {
      background: #1e293b; color: white; padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 17px; font-weight: 700; margin: 0; }
    .refresh-area { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #94a3b8; }
    .coi-form-btn {
      background: #2563eb; color: white; text-decoration: none;
      border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 600;
      transition: background 0.2s; white-space: nowrap;
    }
    .coi-form-btn:hover { background: #1d4ed8; }
    .refresh-btn {
      background: #334155; color: #e2e8f0; border: none; border-radius: 6px;
      padding: 5px 12px; font-size: 12px; cursor: pointer; transition: background 0.2s;
    }
    .refresh-btn:hover { background: #475569; }
    .dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── TABS ── */
    .tabs { background: white; border-bottom: 2px solid #e2e8f0; padding: 0 24px; display: flex; }
    .tab {
      padding: 14px 22px; font-size: 14px; font-weight: 600; color: #64748b;
      border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.15s;
      margin-bottom: -2px;
    }
    .tab.active { color: #2563eb; border-bottom-color: #2563eb; }
    .tab:hover:not(.active) { color: #1e293b; background: #f8fafc; }

    /* ── CONTROLS ── */
    .controls {
      padding: 14px 24px; background: white; border-bottom: 1px solid #e2e8f0;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 14px; pointer-events: none; }
    .search-input {
      width: 100%; padding: 9px 14px 9px 34px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #3b82f6; }
    .filter-select {
      padding: 9px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 14px; outline: none; background: white; cursor: pointer; color: #1e293b;
    }
    .record-count { font-size: 13px; color: #64748b; white-space: nowrap; margin-left: auto; }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; padding: 16px 24px 32px; }
    table {
      width: 100%; border-collapse: collapse; background: white;
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    thead { background: #f8fafc; }
    th {
      padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700;
      color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid #e2e8f0; white-space: nowrap;
    }
    td { padding: 11px 14px; font-size: 13.5px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    .job-num { font-weight: 700; font-size: 13px; color: #1e293b; }
    .customer-name { font-weight: 600; }
    .notes-cell { max-width: 220px; white-space: normal; line-height: 1.45; font-size: 13px; color: #475569; }

    /* ── BADGES ── */
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 11.5px; font-weight: 600; white-space: nowrap; text-transform: capitalize; letter-spacing: 0.01em;
    }
    .badge-green   { background: #dcfce7; color: #166534; }
    .badge-yellow  { background: #fef9c3; color: #854d0e; }
    .badge-red     { background: #fee2e2; color: #991b1b; }
    .badge-blue    { background: #dbeafe; color: #1e40af; }
    .badge-purple  { background: #f3e8ff; color: #6b21a8; }
    .badge-orange  { background: #ffedd5; color: #9a3412; }
    .badge-gray    { background: #f1f5f9; color: #475569; }
    .priority-high   { background: #fee2e2; color: #991b1b; }
    .priority-medium { background: #fef9c3; color: #854d0e; }
    .priority-low    { background: #dcfce7; color: #166534; }

    /* ── LINKS ── */
    a.tlink { color: #2563eb; text-decoration: none; font-weight: 500; font-size: 13px; }
    a.tlink:hover { text-decoration: underline; }
    a.phone-link { color: #1e293b; text-decoration: none; }
    a.phone-link:hover { text-decoration: underline; color: #2563eb; }

    /* ── STATES ── */
    .loading-state, .empty-state {
      text-align: center; padding: 60px 24px; color: #94a3b8; font-size: 14px;
    }
    .spinner {
      display: inline-block; width: 30px; height: 30px;
      border: 3px solid #e2e8f0; border-top-color: #2563eb;
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state { text-align: center; padding: 60px 24px; color: #ef4444; font-size: 14px; }

    /* ── FOOTER ── */
    footer { text-align: center; padding: 14px; font-size: 12px; color: #cbd5e1; }
  </style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">⚙️</div>
    <h1>HVAC Worker Dashboard</h1>
    <p>Enter your access code to continue</p>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
    <button onclick="checkPassword()">Sign In</button>
    <div class="login-error" id="pw-error"></div>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">
  <header>
    <div class="header-left">
      <span style="font-size:20px;">⚙️</span>
      <h1>HVAC Worker Dashboard</h1>
    </div>
    <div class="refresh-area">
      <a href="https://armandojdiaz.com/coi-form/" target="_blank" rel="noopener" class="coi-form-btn">+ Submit COI Form</a>
      <span class="dot"></span>
      <span id="last-updated">Loading...</span>
      <button class="refresh-btn" onclick="refreshAll()">↻ Refresh</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" id="tab-intake" onclick="switchTab('intake')">📋 Intake / Questionnaire</div>
    <div class="tab" id="tab-coi" onclick="switchTab('coi')">📄 COI Tracker</div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-box" type="text" placeholder="Search by name, job #, condo, address..." oninput="filterTable()" />
    </div>
    <select class="filter-select" id="status-filter" onchange="filterTable()">
      <option value="">All Statuses</option>
    </select>
    <span class="record-count" id="record-count"></span>
  </div>

  <div class="table-wrap">
    <div id="table-container">
      <div class="loading-state"><div class="spinner"></div><br>Loading data...</div>
    </div>
  </div>

  <footer>HVAC Dashboard · Auto-refreshes every 60 seconds · Internal use only</footer>
</div>

<script>
  // ══════════════════════════════════════
  //  CONFIG — change PASSWORD here
  // ══════════════════════════════════════
  const PASSWORD = 'worker2026';

  const INTAKE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ585s7QnwNt-7lRuzuU5VEYAFDLaHqx49VkGDIfDHyTywuiJsFlfxbX6Zw0vjYohSYBvji7spgQRa/pub?output=csv';
  const COI_URL   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSJgyTM3U8MTCjy0p6KO3kYGLYX-olMEmSidNpy5AR_Mhkz-dv1LUl6M0ZGJIs_ura70uG0nwPe1i3h/pub?output=csv';

  const REFRESH_MS = 60000; // 60 seconds

  // ══════════════════════════════════════
  //  STATE
  // ══════════════════════════════════════
  let currentTab   = 'intake';
  let intakeData   = [];
  let coiData      = [];
  let filteredData = [];
  let refreshTimer = null;

  // ══════════════════════════════════════
  //  PASSWORD GATE
  // ══════════════════════════════════════
  function checkPassword() {
    const input = document.getElementById('pw-input').value;
    if (input === PASSWORD) {
      sessionStorage.setItem('hvac_auth', '1');
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      refreshAll();
      startAutoRefresh();
    } else {
      const err = document.getElementById('pw-error');
      err.textContent = 'Incorrect password — try again.';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
      setTimeout(() => { err.textContent = ''; }, 3000);
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  // Auto-login if already authenticated this session
  if (sessionStorage.getItem('hvac_auth') === '1') {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    refreshAll();
    startAutoRefresh();
  }

  // ══════════════════════════════════════
  //  CSV PARSER — handles multi-line quoted fields
  //  (notes column contains JSON with embedded newlines)
  // ══════════════════════════════════════
  function parseCSV(text) {
    const rows = [];
    let row      = [];
    let current  = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const ch   = text[i];
      const next = text[i + 1];

      if (ch === '"') {
        if (inQuotes && next === '"') { current += '"'; i++; } // escaped quote
        else { inQuotes = !inQuotes; }
      } else if (ch === ',' && !inQuotes) {
        row.push(current.trim());
        current = '';
      } else if ((ch === '\r' || ch === '\n') && !inQuotes) {
        if (ch === '\r' && next === '\n') i++; // skip \r\n pair
        row.push(current.trim());
        current = '';
        if (row.some(c => c)) rows.push(row);
        row = [];
      } else {
        current += ch;
      }
    }
    // flush last field/row
    if (current || row.length > 0) {
      row.push(current.trim());
      if (row.some(c => c)) rows.push(row);
    }
    return rows;
  }

  // Clean up notes: if it's JSON-ish, extract the human-readable "reason" field
  function cleanNotes(raw) {
    if (!raw || !raw.trim()) return '—';
    const s = raw.trim();
    // Try to pull out the "reason" value from Make.com JSON notes
    const reasonMatch = s.match(/reason\s*:\s*([^\n,}]+)/i);
    if (reasonMatch) return reasonMatch[1].trim();
    // If it starts with { but no reason found, just strip it
    if (s.startsWith('{')) return '(see sheet)';
    // Otherwise show as-is, capped at 120 chars
    return s.length > 120 ? s.slice(0, 120) + '…' : s;
  }

  async function fetchCSV(url) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return parseCSV(await resp.text());
  }

  // ══════════════════════════════════════
  //  REFRESH
  // ══════════════════════════════════════
  async function refreshAll() {
    document.getElementById('last-updated').textContent = 'Refreshing...';
    try {
      const [intake, coi] = await Promise.all([
        fetchCSV(INTAKE_URL),
        fetchCSV(COI_URL)
      ]);
      // Row 0 = headers, skip; filter out fully-empty rows
      intakeData = intake.slice(1).filter(r => r.some(c => c));
      coiData    = coi.slice(1).filter(r => r.some(c => c));

      const t = new Date();
      document.getElementById('last-updated').textContent =
        'Updated ' + t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      renderCurrentTab();
    } catch (err) {
      document.getElementById('last-updated').textContent = 'Error — check connection';
      document.getElementById('table-container').innerHTML =
        `<div class="error-state">⚠️ Could not load data.<br><small>${err.message}</small></div>`;
    }
  }

  function startAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(refreshAll, REFRESH_MS);
  }

  // ══════════════════════════════════════
  //  TABS
  // ══════════════════════════════════════
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-intake').classList.toggle('active', tab === 'intake');
    document.getElementById('tab-coi').classList.toggle('active', tab === 'coi');
    document.getElementById('search-box').value = '';
    renderCurrentTab();
  }

  function renderCurrentTab() {
    if (currentTab === 'intake') renderIntake();
    else renderCOI();
  }

  // ══════════════════════════════════════
  //  HELPERS
  // ══════════════════════════════════════
  function statusBadge(raw) {
    if (!raw || !raw.trim()) return '<span class="badge badge-gray">—</span>';
    const s   = raw.trim().toLowerCase().replace(/_/g, ' ');
    const lbl = raw.trim().replace(/_/g, ' ');
    let cls   = 'badge-gray';
    if (/complet|deliver|accept|done|approv|received/.test(s))            cls = 'badge-green';
    else if (/stale|expir|reject|cancel|overdue|missing/.test(s))         cls = 'badge-red';
    else if (/legal|forward|in.?progress|wc|pl|sent/.test(s))            cls = 'badge-blue';
    else if (/pending|waiting|new|open/.test(s))                          cls = 'badge-yellow';
    else if (/form|request/.test(s))                                       cls = 'badge-purple';
    return `<span class="badge ${cls}">${lbl}</span>`;
  }

  function priorityBadge(p) {
    if (!p || !p.trim()) return '—';
    const s = p.trim().toLowerCase();
    let cls = 'badge ';
    if (s === 'high')                   cls += 'priority-high';
    else if (s === 'medium' || s === 'med') cls += 'priority-medium';
    else                                cls += 'priority-low';
    return `<span class="${cls}">${p.trim()}</span>`;
  }

  function safe(val)  { return val && val.trim() ? val.trim() : '—'; }
  function date(val)  { return val && val.trim() ? `<span style="white-space:nowrap">${val.trim()}</span>` : '—'; }

  function phoneLink(val) {
    if (!val || !val.trim()) return '—';
    const num = val.trim();
    return `<a class="phone-link" href="tel:${num}">${num}</a>`;
  }

  function actionLink(url, label) {
    if (!url || !url.trim()) return '—';
    return `<a class="tlink" href="${url.trim()}" target="_blank" rel="noopener">${label}</a>`;
  }

  // ══════════════════════════════════════
  //  FILTER
  // ══════════════════════════════════════
  function filterTable() {
    const q         = document.getElementById('search-box').value.toLowerCase();
    const statusVal = document.getElementById('status-filter').value.toLowerCase();
    const statusIdx = currentTab === 'intake' ? 9 : 4;
    const source    = currentTab === 'intake' ? intakeData : coiData;

    filteredData = source.filter(row => {
      const text      = row.join(' ').toLowerCase();
      const rowStatus = (row[statusIdx] || '').toLowerCase();
      const matchQ    = !q || text.includes(q);
      const matchS    = !statusVal || rowStatus === statusVal;
      return matchQ && matchS;
    });
    renderTable();
  }

  function buildStatusFilter(data, idx) {
    const sel = document.getElementById('status-filter');
    const vals = [...new Set(data.map(r => r[idx]).filter(v => v && v.trim()))].sort();
    sel.innerHTML = '<option value="">All Statuses</option>';
    vals.forEach(v => {
      const o = document.createElement('option');
      o.value       = v.trim().toLowerCase();
      o.textContent = v.trim().replace(/_/g, ' ');
      sel.appendChild(o);
    });
  }

  // ══════════════════════════════════════
  //  RENDER INTAKE
  // ══════════════════════════════════════
  function renderIntake() {
    buildStatusFilter(intakeData, 9);
    filteredData = [...intakeData];
    renderTable();
  }

  // ══════════════════════════════════════
  //  RENDER COI
  // ══════════════════════════════════════
  function renderCOI() {
    buildStatusFilter(coiData, 4);
    filteredData = [...coiData];
    renderTable();
  }

  // ══════════════════════════════════════
  //  RENDER TABLE (dispatch)
  // ══════════════════════════════════════
  function renderTable() {
    document.getElementById('record-count').textContent =
      `${filteredData.length} record${filteredData.length !== 1 ? 's' : ''}`;

    const container = document.getElementById('table-container');
    if (filteredData.length === 0) {
      container.innerHTML = '<div class="empty-state">No records match your search.</div>';
      return;
    }
    currentTab === 'intake' ? buildIntakeTable(container) : buildCOITable(container);
  }

  // ══════════════════════════════════════
  //  INTAKE TABLE
  //  A=0 Job#  B=1 Customer  C=2 Phone  D=3 Email  E=4 Address
  //  F=5 ItemType  G=6 Problem  H=7 Priority  I=8 DateSent  J=9 Status
  //  K=10 DateAccepted  L=11 CustomerID  M=12 FollowUpSent  N=13 JotformLink
  //  Z=25 BackupNotes
  // ══════════════════════════════════════
  function buildIntakeTable(container) {
    let html = `
      <table>
        <thead><tr>
          <th>Job #</th>
          <th>Customer</th>
          <th>Phone</th>
          <th>Address</th>
          <th>Item Type</th>
          <th>Problem</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Date Sent</th>
          <th>Date Accepted</th>
          <th>Form</th>
        </tr></thead>
        <tbody>`;

    for (const r of filteredData) {
      html += `<tr>
        <td><span class="job-num">${safe(r[0])}</span></td>
        <td><span class="customer-name">${safe(r[1])}</span></td>
        <td>${phoneLink(r[2])}</td>
        <td>${safe(r[4])}</td>
        <td>${safe(r[5])}</td>
        <td>${safe(r[6])}</td>
        <td>${priorityBadge(r[7])}</td>
        <td>${statusBadge(r[9])}</td>
        <td>${date(r[8])}</td>
        <td>${date(r[10])}</td>
        <td>${actionLink(r[13], '↗ Open')}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  // ══════════════════════════════════════
  //  COI TABLE
  //  A=0 job_number  B=1 customer  C=2 condo_name  D=3 condo_email  E=4 status
  //  F=5 date_requested  G=6 date_form_received  H=7 date_sent_to_legal
  //  I=8 date_wc_forwarded  J=9 date_pl_forwarded  K=10 date_delivered
  //  L=11 notes  M=12 date_wc_response  N=13 date_pl_response
  //  Q=16 completed_folder_url  Z=25 customer_address
  // ══════════════════════════════════════
  function buildCOITable(container) {
    let html = `
      <table>
        <thead><tr>
          <th>Job #</th>
          <th>Customer</th>
          <th>Condo</th>
          <th>Status</th>
          <th>Date Requested</th>
          <th>Form Received</th>
          <th>Date Delivered</th>
          <th>WC Response</th>
          <th>PL Response</th>
          <th>Notes</th>
          <th>Folder</th>
        </tr></thead>
        <tbody>`;

    for (const r of filteredData) {
      html += `<tr>
        <td><span class="job-num">${safe(r[0])}</span></td>
        <td><span class="customer-name">${safe(r[1])}</span></td>
        <td>${safe(r[2])}</td>
        <td>${statusBadge(r[4])}</td>
        <td>${date(r[5])}</td>
        <td>${date(r[6])}</td>
        <td>${date(r[10])}</td>
        <td>${date(r[12])}</td>
        <td>${date(r[13])}</td>
        <td><span class="notes-cell">${cleanNotes(r[11])}</span></td>
        <td>${actionLink(r[16], '↗ Open')}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
  }
</script>
</body>
</html>
